---
# ClusterIssuer — Let's Encrypt Staging
# Use staging first to verify cert-manager is wired up, then switch to production.
# Staging certificates are signed but NOT trusted by browsers.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Replace with the email that should receive expiry notices.
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - kind: Gateway
                name: waggle-gateway
                sectionName: http

---
# ClusterIssuer — Let's Encrypt Production
# Switch Certificate.issuerRef.name to letsencrypt-prod once staging confirms OK.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - kind: Gateway
                name: waggle-gateway
                sectionName: http

---
# Certificate resource — cert-manager will create and renew this automatically.
# The secretName here must match gateway.yaml -> listeners[].tls.certificateRefs[].name.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: waggle-tls
spec:
  secretName: waggle-tls
  # Switch issuerRef.name to letsencrypt-prod when ready.
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: waggle.example.com
  dnsNames:
    # Replace with your real hostname(s).
    - waggle.example.com
  # cert-manager will auto-renew 30 days before expiry.
  duration: 2160h   # 90 days
  renewBefore: 720h # 30 days
