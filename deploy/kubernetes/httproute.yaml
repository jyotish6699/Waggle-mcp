---
# Redirect HTTP to HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: waggle-redirect-https
spec:
  parentRefs:
    - name: waggle-gateway
      sectionName: http
  hostnames:
    # Replace with your real hostname before applying
    - waggle.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# Main app route over HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: waggle
spec:
  parentRefs:
    - name: waggle-gateway
      sectionName: https
  hostnames:
    # Replace with your real hostname before applying
    - waggle.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: waggle
          port: 80
